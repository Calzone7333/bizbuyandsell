name: Deploy BizBuySell (Backend + Frontend)

on:
  push:
    branches:
      - main  # deploy only when pushing to main branch
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v4

      ############################
      # 2️⃣ Build Backend (Spring Boot)
      ############################
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Spring Boot backend
        run: mvn clean package -f Backend/pom.xml

      ############################
      # 3️⃣ Setup SSH for Deployment
      ############################
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      ############################
      # 4️⃣ Build Frontend (Angular)
      ############################
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      ############################
      # 5️⃣ Deploy Backend JAR
      ############################
      - name: Deploy Backend
        run: |
          # Create directory if it doesn't exist
          ssh -p 19919 -o StrictHostKeyChecking=no prakash@103.181.108.248 "mkdir -p /home/prakash/apps/bizbuysell/Backend/target"
          
          rsync -avz -e "ssh -p 19919 -o StrictHostKeyChecking=no" \
          Backend/target/backend-0.0.1-SNAPSHOT.jar \
          prakash@103.181.108.248:/home/prakash/apps/bizbuysell/Backend/target/

      ############################
      # 6️⃣ Deploy Frontend (dist folder)
      ############################
      - name: Deploy Frontend
        run: |
          # Create directory if it doesn't exist
          ssh -p 19919 -o StrictHostKeyChecking=no prakash@103.181.108.248 "mkdir -p /home/prakash/apps/bizbuysell/frontend/dist"
          
          # Detect Angular output directory
          if [ -d "frontend/dist/bizbuysell/browser" ]; then
            SRC_DIR="frontend/dist/bizbuysell/browser/"
          elif [ -d "frontend/dist/bizbuysell" ]; then
            SRC_DIR="frontend/dist/bizbuysell/"
          else
            SRC_DIR="frontend/dist/"
          fi
          
          rsync -avz --delete --exclude 'uploads' -e "ssh -p 19919 -o StrictHostKeyChecking=no" \
          $SRC_DIR \
          prakash@103.181.108.248:/home/prakash/apps/bizbuysell/frontend/dist/

      ############################
      # 7️⃣ Copy Frontend to Apache Dir
      ############################
      - name: Copy Frontend
        run: |
          # Ensure web directory exists and copy contents using rsync to preserve uploads folder
          ssh -p 19919 -o StrictHostKeyChecking=no prakash@103.181.108.248 "mkdir -p /var/www/bizbuysell && rsync -av --delete --exclude 'uploads' /home/prakash/apps/bizbuysell/frontend/dist/ /var/www/bizbuysell/"

      ############################
      # 8️⃣ Restart Backend Application
      ############################
      - name: Restart Backend
        run: |
          ssh -p 19919 -o StrictHostKeyChecking=no prakash@103.181.108.248 << 'EOF'
            # Navigate to the server directory
            cd /home/prakash/apps/bizbuysell/Backend

            # Stop existing backend on port 8086
            echo "Stopping existing app..."
            fuser -k 8086/tcp || pkill -f 'backend' || true
            sleep 5 # Wait for the port to be fully cleared
            
            # Start new backend in background
            echo "Starting new app..."
            nohup java -jar target/backend-0.0.1-SNAPSHOT.jar > app.log 2>&1 &
            
            echo "BizBuySell Deployment Complete! Please wait 15-30 seconds for the app to start."
          EOF
